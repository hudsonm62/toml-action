name: "TOML Reader Action"
description: "Read a specific field from a TOML file"
branding:
  icon: file-text
  color: gray-dark
inputs:
  file:
    description: "The TOML file to read from"
    required: true
  field:
    description: "The field inside the TOML file to read"
    required: true
  fail-missing-field:
    description: "Whether to fail if the field is missing/null (default: true)"
    required: false
    default: "true"
outputs:
  value:
    description: "The data stored in `field` inside `file`"
runs:
  using: node24
  main: "dist/index.js"
